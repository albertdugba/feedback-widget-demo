<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feedback Widget Demo</title>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        line-height: 1.7;
        color: #1e293b;
        max-width: 720px;
        margin: 0 auto;
        padding: 60px 24px;
      }
      h1 {
        font-size: 2.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #7c3aed 0%, #6366f1 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 8px;
      }
      .subtitle {
        font-size: 1.125rem;
        color: #64748b;
        margin-bottom: 48px;
      }
      h2 {
        font-size: 1.25rem;
        font-weight: 600;
        margin-top: 40px;
        margin-bottom: 16px;
      }
      code {
        background: #f1f5f9;
        padding: 2px 8px;
        border-radius: 6px;
        font-size: 14px;
        font-family: "SF Mono", Monaco, monospace;
      }
      pre {
        background: #1e293b;
        color: #e2e8f0;
        padding: 20px;
        border-radius: 12px;
        overflow-x: auto;
        font-size: 14px;
        line-height: 1.6;
      }
      pre code {
        background: transparent;
        padding: 0;
      }
      ul {
        padding-left: 24px;
      }
      li {
        margin-bottom: 8px;
      }
      .tip {
        background: #f0fdf4;
        border-left: 4px solid #10b981;
        padding: 16px 20px;
        border-radius: 0 8px 8px 0;
        margin: 24px 0;
      }
      .tip strong {
        color: #059669;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
