name: Deploy Widget SDK

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --no-frozen-lockfile

      - run: pnpm build

      - name: Prepare deploy
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="latest"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

          mkdir -p deploy
          if git ls-remote --heads origin production | grep -q production; then
            git worktree add deploy-branch origin/production
            cp -r deploy-branch/* deploy/ 2>/dev/null || true
            git worktree remove deploy-branch
          fi

          cp dist/feedback-widget.iife.js deploy/
          mkdir -p "deploy/$VERSION"
          cp dist/feedback-widget.iife.js "deploy/$VERSION/"

          if [[ "$VERSION" != "latest" ]]; then
            mkdir -p deploy/latest
            cp dist/feedback-widget.iife.js deploy/latest/
          fi

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy deploy --project-name=feedback-widget --branch=main

      - name: Update production branch
        run: |
          cd deploy
          git init
          git checkout -b production
          git add -A
          git -c user.name="github-actions" -c user.email="actions@github.com" commit -m "deploy $VERSION"
          git remote add origin https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git
          git push origin production --force

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$VERSION" \
            dist/feedback-widget.iife.js \
            --title "$VERSION" \
            --generate-notes

      - name: Summary
        run: |
          echo "### Latest" >> "$GITHUB_STEP_SUMMARY"
          echo '```html' >> "$GITHUB_STEP_SUMMARY"
          echo '<script src="https://feedback-widget-csk.pages.dev/feedback-widget.iife.js"></script>' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "### Pinned to $VERSION" >> "$GITHUB_STEP_SUMMARY"
            echo '```html' >> "$GITHUB_STEP_SUMMARY"
            echo "<script src=\"https://feedback-widget-csk.pages.dev/$VERSION/feedback-widget.iife.js\"></script>" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
